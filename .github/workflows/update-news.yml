name: Update news feed

on:
  workflow_dispatch:
  schedule:
    - cron: "0 * * * *"

permissions:
  contents: write

jobs:
  update-news:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate news
        run: npm run news:generate

      - name: Build
        run: npm run build

      - name: Commit generated news
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update generated news"
          file_pattern: "posts/*.md data/generated/news-state.json"
